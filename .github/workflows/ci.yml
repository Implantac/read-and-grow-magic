name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      eslint_min_overlap:
        description: "Mínimo de entradas preservadas (pre∩post intra-run) para considerar REUSED."
        required: false
        default: "1"
      eslint_min_cross_overlap:
        description: "Mínimo de chaves compartilhadas (prev.post ∩ cur.pre) para confirmar reuse cross-run."
        required: false
        default: "1"
      eslint_max_size_delta_pct:
        description: "Variação máxima permitida (%) do tamanho do .eslintcache entre runs. 0 desabilita."
        required: false
        default: "50"
      eslint_require_mtime_continuity:
        description: "Exigir que cur.pre.mtime == prev.post.mtime (true/false)."
        required: false
        default: "false"
      eslint_require_mtime_changed:
        description: "Exigir que mtime mude durante o lint para considerar REUSED (true/false)."
        required: false
        default: "false"

# Thresholds configuráveis do ESLint cache.
# Precedência: vars.* (repo/org) > workflow_dispatch.inputs > default hardcoded.
# Defina em Settings → Secrets and variables → Actions → Variables com os mesmos
# nomes (ESLINT_MIN_OVERLAP, ESLINT_MIN_CROSS_OVERLAP, ESLINT_MAX_SIZE_DELTA_PCT,
# ESLINT_REQUIRE_MTIME_CONTINUITY, ESLINT_REQUIRE_MTIME_CHANGED) para sobrescrever.
env:
  ESLINT_MIN_OVERLAP: ${{ vars.ESLINT_MIN_OVERLAP || github.event.inputs.eslint_min_overlap || '1' }}
  ESLINT_MIN_CROSS_OVERLAP: ${{ vars.ESLINT_MIN_CROSS_OVERLAP || github.event.inputs.eslint_min_cross_overlap || '1' }}
  ESLINT_MAX_SIZE_DELTA_PCT: ${{ vars.ESLINT_MAX_SIZE_DELTA_PCT || github.event.inputs.eslint_max_size_delta_pct || '50' }}
  ESLINT_REQUIRE_MTIME_CONTINUITY: ${{ vars.ESLINT_REQUIRE_MTIME_CONTINUITY || github.event.inputs.eslint_require_mtime_continuity || 'false' }}
  ESLINT_REQUIRE_MTIME_CHANGED: ${{ vars.ESLINT_REQUIRE_MTIME_CHANGED || github.event.inputs.eslint_require_mtime_changed || 'false' }}

jobs:
  # Job dedicado para testes do validador de thresholds.
  # Usa dorny/paths-filter para rodar a suite apenas quando arquivos
  # relevantes mudam (validator, testes ou o próprio workflow). Quando
  # nada relevante muda, o job termina em sucesso como no-op — assim o
  # `needs:` do job `quality` continua satisfeito sem custo extra.
  eslint-thresholds-tests:
    name: ESLint thresholds — tests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      ran: ${{ steps.filter.outputs.thresholds }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes to threshold files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # Em pushes (sem base), o filter retorna "true" para todos os filtros,
          # garantindo que pelo menos um push na branch padrão valide a suite.
          filters: |
            thresholds:
              - 'scripts/validate-eslint-thresholds.sh'
              - 'scripts/test-eslint-thresholds.sh'
              - '.github/workflows/ci.yml'

      - name: Run threshold validator tests
        if: steps.filter.outputs.thresholds == 'true'
        run: bash scripts/test-eslint-thresholds.sh

      - name: Skip notice
        if: steps.filter.outputs.thresholds != 'true'
        run: |
          echo "ℹ️  Nenhuma alteração em validate-eslint-thresholds.sh / test-eslint-thresholds.sh / ci.yml."
          echo "    Pulando suite de testes (job marcado como sucesso)."

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.filter.outputs.thresholds }}" = "true" ]; then
            STATUS="executada (\`${{ job.status }}\`)"
            REASON="arquivos relevantes alterados neste PR/push"
          else
            STATUS="pulada"
            REASON="nenhum arquivo relevante alterado"
          fi
          {
            echo "## 🧪 ESLint thresholds — tests"
            echo ""
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| Suite | $STATUS |"
            echo "| Motivo | $REASON |"
            echo "| Arquivos monitorados | \`scripts/validate-eslint-thresholds.sh\`, \`scripts/test-eslint-thresholds.sh\`, \`.github/workflows/ci.yml\` |"
            echo ""
            echo "> Quando executada, uma falha aqui bloqueia o job \`quality\` via \`needs:\`."
          } >> "$GITHUB_STEP_SUMMARY"


  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    needs: eslint-thresholds-tests
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Guard adicional: re-roda os testes apenas quando o job dedicado
      # também rodou (mesmo critério paths-filter), evitando trabalho
      # duplicado em PRs que não tocam thresholds.
      - name: Test ESLint threshold validator (guard)
        if: needs.eslint-thresholds-tests.outputs.ran == 'true'
        run: bash scripts/test-eslint-thresholds.sh

      # Valida faixas dos thresholds do ESLint cache (vars/inputs/env).
      # Falha cedo com mensagem clara para evitar verdicts silenciosamente errados.
      - name: Validate ESLint cache thresholds
        run: bash scripts/validate-eslint-thresholds.sh





      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun global store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lockb', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Cache build artifacts (vite + tsbuildinfo)
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
            node_modules/.cache/tsbuildinfo
            dist/.vite
          key: ${{ runner.os }}-build-${{ hashFiles('bun.lockb', 'bun.lock', 'tsconfig*.json', 'vite.config.ts') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ hashFiles('bun.lockb', 'bun.lock', 'tsconfig*.json', 'vite.config.ts') }}-
            ${{ runner.os }}-build-

      # Cache do ESLint dividido em restore/save para que a chave dependa
      # APENAS do que afeta regras (config + plugins resolvidos via lockfile).
      # O save usa um sufixo único (run_id) só para permitir gravar uma nova
      # versão; o restore casa pela chave estável via restore-keys.
      - name: Restore ESLint cache
        id: eslint-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: node_modules/.cache/eslint
          key: ${{ runner.os }}-eslint-v1-${{ hashFiles('eslint.config.*', 'bun.lockb', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-eslint-v1-

      - name: Report ESLint cache restore status
        run: |
          MATCHED='${{ steps.eslint-cache-restore.outputs.cache-matched-key }}'
          HIT='${{ steps.eslint-cache-restore.outputs.cache-hit }}'
          if [ "$HIT" = "true" ]; then
            STATUS="exact hit"
          elif [ -n "$MATCHED" ]; then
            STATUS="partial hit (restore-keys)"
          else
            STATUS="miss"
          fi
          echo "ESLint cache: $STATUS"
          echo "Matched key: ${MATCHED:-<none>}"
          if [ -f node_modules/.cache/eslint/.eslintcache ]; then
            SIZE=$(du -h node_modules/.cache/eslint/.eslintcache | cut -f1)
            echo "Cache file size: $SIZE"
          else
            SIZE="n/a"
          fi
          REQUESTED="${{ runner.os }}-eslint-v1-${{ hashFiles('eslint.config.*', 'bun.lockb', 'bun.lock') }}"
          {
            echo "## 🧹 ESLint cache — Restore"
            echo ""
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| Status | \`$STATUS\` |"
            echo "| Requested key | \`$REQUESTED\` |"
            echo "| Matched key | \`${MATCHED:-<none>}\` |"
            echo "| Arquivo restaurado | \`$( [ -f node_modules/.cache/eslint/.eslintcache ] && echo true || echo false )\` |"
            echo "| Tamanho do arquivo | \`$SIZE\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Typecheck
        run: bun run typecheck

      # Captura estado do .eslintcache ANTES do lint (mtime + cópia das chaves)
      # para depois comparar com o pós-lint e provar reutilização.
      - name: Snapshot ESLint cache (pre-lint)
        id: eslint-pre
        run: |
          CACHE=node_modules/.cache/eslint/.eslintcache
          mkdir -p /tmp/eslint-cache-snapshot
          if [ -f "$CACHE" ]; then
            MTIME=$(stat -c%Y "$CACHE")
            MTIME_HUMAN=$(date -u -d "@$MTIME" +"%Y-%m-%dT%H:%M:%SZ")
            SIZE=$(stat -c%s "$CACHE")
            ENTRIES=$(node -e "try{const a=JSON.parse(require('fs').readFileSync('$CACHE','utf8'));console.log(Array.isArray(a)?a.length:Object.keys(a).length)}catch(e){console.log(0)}")
            # Dump das CHAVES (filePath) presentes no cache antes do lint.
            node -e "try{const a=JSON.parse(require('fs').readFileSync('$CACHE','utf8'));const keys=Array.isArray(a)?a.map(e=>e.filePath||e[0]).filter(Boolean):Object.keys(a);require('fs').writeFileSync('/tmp/eslint-cache-snapshot/pre-keys.txt',keys.sort().join('\n'))}catch(e){require('fs').writeFileSync('/tmp/eslint-cache-snapshot/pre-keys.txt','')}"
            echo "exists=true"           >> "$GITHUB_OUTPUT"
            echo "entries=$ENTRIES"      >> "$GITHUB_OUTPUT"
            echo "size=$SIZE"            >> "$GITHUB_OUTPUT"
            echo "mtime=$MTIME"          >> "$GITHUB_OUTPUT"
            echo "mtime_human=$MTIME_HUMAN" >> "$GITHUB_OUTPUT"
          else
            : > /tmp/eslint-cache-snapshot/pre-keys.txt
            echo "exists=false"  >> "$GITHUB_OUTPUT"
            echo "entries=0"     >> "$GITHUB_OUTPUT"
            echo "size=0"        >> "$GITHUB_OUTPUT"
            echo "mtime=0"       >> "$GITHUB_OUTPUT"
            echo "mtime_human=n/a" >> "$GITHUB_OUTPUT"
          fi

      # Falha em qualquer erro/warning novo, EXCETO @typescript-eslint/no-explicit-any
      # (limpeza incremental ainda em andamento).
      - name: Lint (strict, ignora no-explicit-any)
        id: lint
        run: |
          set -o pipefail
          START=$(date +%s)
          bun run lint:ci | tee /tmp/lint-ci.log
          echo "duration_s=$(( $(date +%s) - START ))" >> "$GITHUB_OUTPUT"

      # Verifica reutilização real via metadata do .eslintcache:
      #  1) mtime mudou  -> ESLint reescreveu o arquivo (i.e., abriu+salvou)
      #  2) interseção de chaves pre∩post > 0 -> entradas antigas foram preservadas
      # Ambos verdadeiros = cache foi efetivamente reutilizado, não apenas recriado.
      - name: Verify ESLint cache reuse (via mtime + key overlap)
        if: always()
        id: eslint-verify
        run: |
          CACHE=node_modules/.cache/eslint/.eslintcache
          PRE_EXISTS='${{ steps.eslint-pre.outputs.exists }}'
          PRE_ENTRIES='${{ steps.eslint-pre.outputs.entries }}'
          PRE_SIZE='${{ steps.eslint-pre.outputs.size }}'
          PRE_MTIME='${{ steps.eslint-pre.outputs.mtime }}'
          PRE_MTIME_HUMAN='${{ steps.eslint-pre.outputs.mtime_human }}'

          if [ -f "$CACHE" ]; then
            POST_MTIME=$(stat -c%Y "$CACHE")
            POST_MTIME_HUMAN=$(date -u -d "@$POST_MTIME" +"%Y-%m-%dT%H:%M:%SZ")
            POST_SIZE=$(stat -c%s "$CACHE")
            POST_ENTRIES=$(node -e "try{const a=JSON.parse(require('fs').readFileSync('$CACHE','utf8'));console.log(Array.isArray(a)?a.length:Object.keys(a).length)}catch(e){console.log(0)}")
            node -e "try{const a=JSON.parse(require('fs').readFileSync('$CACHE','utf8'));const keys=Array.isArray(a)?a.map(e=>e.filePath||e[0]).filter(Boolean):Object.keys(a);require('fs').writeFileSync('/tmp/eslint-cache-snapshot/post-keys.txt',keys.sort().join('\n'))}catch(e){require('fs').writeFileSync('/tmp/eslint-cache-snapshot/post-keys.txt','')}"
          else
            POST_MTIME=0; POST_MTIME_HUMAN="n/a"; POST_SIZE=0; POST_ENTRIES=0
            : > /tmp/eslint-cache-snapshot/post-keys.txt
          fi

          OVERLAP=0
          if [ -s /tmp/eslint-cache-snapshot/pre-keys.txt ] && [ -s /tmp/eslint-cache-snapshot/post-keys.txt ]; then
            OVERLAP=$(comm -12 /tmp/eslint-cache-snapshot/pre-keys.txt /tmp/eslint-cache-snapshot/post-keys.txt | wc -l)
          fi

          MTIME_CHANGED=false
          [ "$POST_MTIME" != "$PRE_MTIME" ] && MTIME_CHANGED=true

          # Thresholds configuráveis (env). Defaults: MIN_OVERLAP=1, REQUIRE_MTIME_CHANGED=false.
          MIN_OVERLAP="${ESLINT_MIN_OVERLAP:-1}"
          REQUIRE_MTIME_CHANGED="${ESLINT_REQUIRE_MTIME_CHANGED:-false}"
          OVERLAP_OK=$( [ "$OVERLAP" -ge "$MIN_OVERLAP" ] && echo true || echo false )
          MTIME_OK=$( { [ "$REQUIRE_MTIME_CHANGED" != "true" ] || [ "$MTIME_CHANGED" = "true" ]; } && echo true || echo false )

          if [ "$PRE_EXISTS" = "true" ] && [ "$MTIME_CHANGED" = "true" ] && [ "$OVERLAP_OK" = "true" ]; then
            VERDICT="REUSED — ESLint reabriu (mtime mudou) e preservou $OVERLAP entradas (>= $MIN_OVERLAP)"
            REUSED=true
          elif [ "$PRE_EXISTS" = "true" ] && [ "$OVERLAP_OK" = "true" ] && [ "$MTIME_OK" = "true" ]; then
            VERDICT="REUSED (parcial) — $OVERLAP entradas preservadas (>= $MIN_OVERLAP), mtime inalterado"
            REUSED=true
          elif [ "$PRE_EXISTS" = "true" ] && [ "$OVERLAP" -gt 0 ] && [ "$OVERLAP_OK" = "false" ]; then
            VERDICT="NOT REUSED — overlap=$OVERLAP abaixo do threshold MIN_OVERLAP=$MIN_OVERLAP"
            REUSED=false
          elif [ "$PRE_EXISTS" = "true" ]; then
            VERDICT="NOT REUSED — cache estava presente mas nenhuma entrada sobreviveu (cache invalidado por conteúdo)"
            REUSED=false
          else
            VERDICT="COLD — primeiro run para este hash de config"
            REUSED=false
          fi
          echo "reused=$REUSED" >> "$GITHUB_OUTPUT"
          echo "overlap=$OVERLAP" >> "$GITHUB_OUTPUT"
          echo "min_overlap=$MIN_OVERLAP" >> "$GITHUB_OUTPUT"

          echo "ESLint cache verdict: $VERDICT"
          echo "Pre : mtime=$PRE_MTIME_HUMAN size=${PRE_SIZE}B entries=$PRE_ENTRIES"
          echo "Post: mtime=$POST_MTIME_HUMAN size=${POST_SIZE}B entries=$POST_ENTRIES"
          echo "Key overlap pre∩post: $OVERLAP"

          # Calcula deltas para a coluna Δ (post - pre).
          SIZE_DELTA=$(( POST_SIZE - PRE_SIZE ))
          ENTRIES_DELTA=$(( POST_ENTRIES - PRE_ENTRIES ))
          if [ "$PRE_MTIME" = "0" ] || [ "$POST_MTIME" = "0" ]; then
            MTIME_DELTA="n/a"
          else
            MTIME_DELTA="$(( POST_MTIME - PRE_MTIME ))s"
          fi
          POST_EXISTS=$( [ -f "$CACHE" ] && echo true || echo false )
          [ "$REUSED" = "true" ] && VERDICT_ICON="✅" || VERDICT_ICON="⚠️"
          [ "$MTIME_CHANGED" = "true" ] && MTIME_ICON="🔄" || MTIME_ICON="⏸️"

          {
            echo "## 🧪 Lint & Typecheck"
            echo ""
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| Lint outcome | \`${{ steps.lint.outcome }}\` |"
            echo "| Lint duration | \`${{ steps.lint.outputs.duration_s }}s\` |"
            echo ""
            if [ -f /tmp/lint-ci.log ]; then
              echo "<details><summary>Saída do lint:ci</summary>"
              echo ""
              echo '```'
              grep -E '^\[lint:ci\]' /tmp/lint-ci.log || tail -n 20 /tmp/lint-ci.log
              echo '```'
              echo ""
              echo "</details>"
              echo ""
            fi
            echo "## $VERDICT_ICON ESLint cache — Reuse verification"
            echo ""
            echo "**Verdict:** $VERDICT"
            echo ""
            echo "| Métrica | Pre-lint | Post-lint | Δ |"
            echo "|---|---|---|---|"
            echo "| Arquivo existe | \`$PRE_EXISTS\` | \`$POST_EXISTS\` | — |"
            echo "| mtime (UTC) | \`$PRE_MTIME_HUMAN\` | \`$POST_MTIME_HUMAN\` | \`$MTIME_DELTA\` |"
            echo "| Tamanho (bytes) | \`$PRE_SIZE\` | \`$POST_SIZE\` | \`$SIZE_DELTA\` |"
            echo "| Entradas | \`$PRE_ENTRIES\` | \`$POST_ENTRIES\` | \`$ENTRIES_DELTA\` |"
            echo ""
            echo "| Sinal | Valor |"
            echo "|---|---|"
            echo "| $MTIME_ICON mtime alterado | \`$MTIME_CHANGED\` |"
            echo "| 🔗 Overlap pre∩post (entradas preservadas) | \`$OVERLAP\` |"
            echo "| ♻️ Reutilizado | \`$REUSED\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Gera arquivo de metadados consolidado para anexar como artefato.
          mkdir -p /tmp/eslint-cache-snapshot
          {
            echo "verdict=$VERDICT"
            echo "reused=$REUSED"
            echo "mtime_changed=$MTIME_CHANGED"
            echo "overlap=$OVERLAP"
            echo "pre_exists=$PRE_EXISTS"
            echo "pre_mtime=$PRE_MTIME"
            echo "pre_mtime_human=$PRE_MTIME_HUMAN"
            echo "pre_size=$PRE_SIZE"
            echo "pre_entries=$PRE_ENTRIES"
            echo "post_mtime=$POST_MTIME"
            echo "post_mtime_human=$POST_MTIME_HUMAN"
            echo "post_size=$POST_SIZE"
            echo "post_entries=$POST_ENTRIES"
            echo "lint_outcome=${{ steps.lint.outcome }}"
            echo "lint_duration_s=${{ steps.lint.outputs.duration_s }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "sha=${{ github.sha }}"
          } > /tmp/eslint-cache-snapshot/metadata.txt

          # Computa diffs de chaves (added/removed) para inspeção offline.
          if [ -s /tmp/eslint-cache-snapshot/pre-keys.txt ] || [ -s /tmp/eslint-cache-snapshot/post-keys.txt ]; then
            comm -23 /tmp/eslint-cache-snapshot/pre-keys.txt /tmp/eslint-cache-snapshot/post-keys.txt > /tmp/eslint-cache-snapshot/removed-keys.txt || true
            comm -13 /tmp/eslint-cache-snapshot/pre-keys.txt /tmp/eslint-cache-snapshot/post-keys.txt > /tmp/eslint-cache-snapshot/added-keys.txt   || true
            comm -12 /tmp/eslint-cache-snapshot/pre-keys.txt /tmp/eslint-cache-snapshot/post-keys.txt > /tmp/eslint-cache-snapshot/overlap-keys.txt || true
          fi

      # Baixa o artefato de snapshots do run anterior (mesma workflow) para
      # permitir a comparação cross-run de mtime/tamanho/overlap antes da
      # decisão final de reutilização.
      - name: Download previous run ESLint snapshots
        if: always()
        id: download-prev-snapshots
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: ci.yml
          name: eslint-cache-snapshots-.*
          name_is_regexp: true
          branch: ${{ github.event.pull_request.base.ref || github.ref_name }}
          workflow_conclusion: ""
          search_artifacts: true
          skip_unpack: false
          path: /tmp/eslint-prev
          if_no_artifact_found: warn

      # Compara o snapshot atual com o do run anterior (mtime, tamanho,
      # entradas e overlap das chaves) e consolida a decisão final de
      # reutilização levando em conta ambos os sinais.
      - name: Cross-run ESLint cache comparison & final reuse decision
        if: always()
        id: eslint-crossrun
        env:
          # Brutos para detectar a origem efetiva (vars > input > default).
          VAR_MIN_OVERLAP: ${{ vars.ESLINT_MIN_OVERLAP }}
          VAR_MIN_CROSS_OVERLAP: ${{ vars.ESLINT_MIN_CROSS_OVERLAP }}
          VAR_MAX_SIZE_DELTA_PCT: ${{ vars.ESLINT_MAX_SIZE_DELTA_PCT }}
          VAR_REQUIRE_MTIME_CONTINUITY: ${{ vars.ESLINT_REQUIRE_MTIME_CONTINUITY }}
          VAR_REQUIRE_MTIME_CHANGED: ${{ vars.ESLINT_REQUIRE_MTIME_CHANGED }}
          IN_MIN_OVERLAP: ${{ github.event.inputs.eslint_min_overlap }}
          IN_MIN_CROSS_OVERLAP: ${{ github.event.inputs.eslint_min_cross_overlap }}
          IN_MAX_SIZE_DELTA_PCT: ${{ github.event.inputs.eslint_max_size_delta_pct }}
          IN_REQUIRE_MTIME_CONTINUITY: ${{ github.event.inputs.eslint_require_mtime_continuity }}
          IN_REQUIRE_MTIME_CHANGED: ${{ github.event.inputs.eslint_require_mtime_changed }}
        run: |
          CUR_DIR=/tmp/eslint-cache-snapshot
          PREV_ROOT=/tmp/eslint-prev
          # O dawidd6 cria um subdiretório por artefato quando name_is_regexp=true.
          PREV_DIR=$(find "$PREV_ROOT" -mindepth 1 -maxdepth 2 -type d -name 'eslint-cache-snapshots-*' 2>/dev/null | sort | tail -n1)
          [ -z "$PREV_DIR" ] && [ -d "$PREV_ROOT" ] && PREV_DIR="$PREV_ROOT"

          CUR_META="$CUR_DIR/metadata.txt"
          PREV_META="$PREV_DIR/metadata.txt"

          get_meta() { grep -E "^$2=" "$1" 2>/dev/null | head -n1 | cut -d= -f2- ; }

          if [ -f "$PREV_META" ]; then
            PREV_FOUND=true
            PREV_RUN_ID=$(get_meta "$PREV_META" run_id)
            PREV_SHA=$(get_meta "$PREV_META" sha)
            PREV_POST_MTIME=$(get_meta "$PREV_META" post_mtime)
            PREV_POST_MTIME_HUMAN=$(get_meta "$PREV_META" post_mtime_human)
            PREV_POST_SIZE=$(get_meta "$PREV_META" post_size)
            PREV_POST_ENTRIES=$(get_meta "$PREV_META" post_entries)
            PREV_REUSED=$(get_meta "$PREV_META" reused)
          else
            PREV_FOUND=false
            PREV_RUN_ID="n/a"; PREV_SHA="n/a"
            PREV_POST_MTIME=0; PREV_POST_MTIME_HUMAN="n/a"
            PREV_POST_SIZE=0; PREV_POST_ENTRIES=0; PREV_REUSED="n/a"
          fi

          CUR_PRE_MTIME=$(get_meta "$CUR_META" pre_mtime)
          CUR_PRE_MTIME_HUMAN=$(get_meta "$CUR_META" pre_mtime_human)
          CUR_PRE_SIZE=$(get_meta "$CUR_META" pre_size)
          CUR_PRE_ENTRIES=$(get_meta "$CUR_META" pre_entries)
          CUR_POST_MTIME_HUMAN=$(get_meta "$CUR_META" post_mtime_human)
          CUR_POST_SIZE=$(get_meta "$CUR_META" post_size)
          CUR_POST_ENTRIES=$(get_meta "$CUR_META" post_entries)
          CUR_OVERLAP=$(get_meta "$CUR_META" overlap)
          CUR_MTIME_CHANGED=$(get_meta "$CUR_META" mtime_changed)
          CUR_REUSED=$(get_meta "$CUR_META" reused)

          # Cross-run overlap: chaves do post anterior vs chaves do pre atual.
          CROSS_OVERLAP=0
          if [ -f "$PREV_DIR/post-keys.txt" ] && [ -s "$CUR_DIR/pre-keys.txt" ]; then
            sort -u "$PREV_DIR/post-keys.txt" > /tmp/eslint-prev-post-keys.sorted
            sort -u "$CUR_DIR/pre-keys.txt"  > /tmp/eslint-cur-pre-keys.sorted
            CROSS_OVERLAP=$(comm -12 /tmp/eslint-prev-post-keys.sorted /tmp/eslint-cur-pre-keys.sorted | wc -l)
          fi

          # Continuidade: o cache restaurado neste run deve "herdar" do post do run anterior.
          if [ "$PREV_FOUND" = "true" ] && [ "$CUR_PRE_MTIME" = "$PREV_POST_MTIME" ] && [ "$CUR_PRE_MTIME" != "0" ]; then
            MTIME_CONTINUITY=true
          else
            MTIME_CONTINUITY=false
          fi

          # Thresholds configuráveis (env / workflow_dispatch.inputs).
          MIN_CROSS_OVERLAP="${ESLINT_MIN_CROSS_OVERLAP:-1}"
          MAX_SIZE_DELTA_PCT="${ESLINT_MAX_SIZE_DELTA_PCT:-50}"
          REQUIRE_MTIME_CONTINUITY="${ESLINT_REQUIRE_MTIME_CONTINUITY:-false}"

          # Delta % do tamanho entre prev.post e cur.pre (baseline = prev.post).
          SIZE_DELTA_PCT=0
          if [ "$PREV_FOUND" = "true" ] && [ "${PREV_POST_SIZE:-0}" -gt 0 ]; then
            SIZE_DELTA_PCT=$(awk -v a="$CUR_PRE_SIZE" -v b="$PREV_POST_SIZE" 'BEGIN{d=(a-b)/b*100; if(d<0)d=-d; printf "%.0f", d}')
          fi

          CROSS_OVERLAP_OK=$( [ "$CROSS_OVERLAP" -ge "$MIN_CROSS_OVERLAP" ] && echo true || echo false )
          if [ "$MAX_SIZE_DELTA_PCT" = "0" ]; then
            SIZE_OK=true
          else
            SIZE_OK=$( [ "$SIZE_DELTA_PCT" -le "$MAX_SIZE_DELTA_PCT" ] && echo true || echo false )
          fi
          MTIME_CONT_OK=$( { [ "$REQUIRE_MTIME_CONTINUITY" != "true" ] || [ "$MTIME_CONTINUITY" = "true" ]; } && echo true || echo false )

          FAIL_REASONS=""
          [ "$CROSS_OVERLAP_OK" = "false" ] && FAIL_REASONS="$FAIL_REASONS overlap<$MIN_CROSS_OVERLAP(=$CROSS_OVERLAP);"
          [ "$SIZE_OK"          = "false" ] && FAIL_REASONS="$FAIL_REASONS size_delta=${SIZE_DELTA_PCT}%>${MAX_SIZE_DELTA_PCT}%;"
          [ "$MTIME_CONT_OK"    = "false" ] && FAIL_REASONS="$FAIL_REASONS mtime_continuity_required;"

          if [ "$PREV_FOUND" = "true" ] && [ -z "$FAIL_REASONS" ] && [ "$CUR_REUSED" = "true" ]; then
            FINAL_VERDICT="✅ REUSED (cross-run confirmado: overlap=$CROSS_OVERLAP, Δsize=${SIZE_DELTA_PCT}%, mtime_cont=$MTIME_CONTINUITY)"
            FINAL_REUSED=true
          elif [ "$PREV_FOUND" = "false" ] && [ "$CUR_REUSED" = "true" ]; then
            FINAL_VERDICT="✅ REUSED (sem baseline anterior; verdict local mantido)"
            FINAL_REUSED=true
          elif [ "$PREV_FOUND" = "true" ] && [ -n "$FAIL_REASONS" ]; then
            FINAL_VERDICT="⚠️ NOT REUSED (thresholds violados:$FAIL_REASONS run anterior #$PREV_RUN_ID)"
            FINAL_REUSED=false
          else
            FINAL_VERDICT="⚠️ NOT REUSED (verdict local: $CUR_REUSED)"
            FINAL_REUSED=false
          fi


          echo "final_reused=$FINAL_REUSED"   >> "$GITHUB_OUTPUT"
          echo "cross_overlap=$CROSS_OVERLAP" >> "$GITHUB_OUTPUT"
          echo "prev_found=$PREV_FOUND"       >> "$GITHUB_OUTPUT"
          echo "prev_run_id=$PREV_RUN_ID"     >> "$GITHUB_OUTPUT"

          echo "Cross-run verdict: $FINAL_VERDICT"
          echo "Previous run: $PREV_RUN_ID (sha=$PREV_SHA) found=$PREV_FOUND"
          echo "Cross-run key overlap (prev.post ∩ cur.pre): $CROSS_OVERLAP"
          echo "Mtime continuity (cur.pre == prev.post): $MTIME_CONTINUITY"

          # Persiste no metadata para o artefato deste run.
          {
            echo "prev_found=$PREV_FOUND"
            echo "prev_run_id=$PREV_RUN_ID"
            echo "prev_sha=$PREV_SHA"
            echo "cross_overlap=$CROSS_OVERLAP"
            echo "mtime_continuity=$MTIME_CONTINUITY"
            echo "size_delta_pct=$SIZE_DELTA_PCT"
            echo "threshold_min_overlap=${ESLINT_MIN_OVERLAP:-1}"
            echo "threshold_min_cross_overlap=$MIN_CROSS_OVERLAP"
            echo "threshold_max_size_delta_pct=$MAX_SIZE_DELTA_PCT"
            echo "threshold_require_mtime_continuity=$REQUIRE_MTIME_CONTINUITY"
            echo "threshold_require_mtime_changed=${ESLINT_REQUIRE_MTIME_CHANGED:-false}"
            echo "final_reused=$FINAL_REUSED"
            echo "final_verdict=$FINAL_VERDICT"
          } >> "$CUR_META"

          {
            echo "## 🔁 ESLint cache — Cross-run comparison"
            echo ""
            echo "**Final verdict:** $FINAL_VERDICT"
            echo ""
            echo "| Métrica | Previous run (post) | Current run (pre) | Current run (post) |"
            echo "|---|---|---|---|"
            echo "| Run ID | \`$PREV_RUN_ID\` | \`${{ github.run_id }}\` | \`${{ github.run_id }}\` |"
            echo "| mtime (UTC) | \`$PREV_POST_MTIME_HUMAN\` | \`$CUR_PRE_MTIME_HUMAN\` | \`$CUR_POST_MTIME_HUMAN\` |"
            echo "| Tamanho (bytes) | \`$PREV_POST_SIZE\` | \`$CUR_PRE_SIZE\` | \`$CUR_POST_SIZE\` |"
            echo "| Entradas | \`$PREV_POST_ENTRIES\` | \`$CUR_PRE_ENTRIES\` | \`$CUR_POST_ENTRIES\` |"
            echo ""
            echo "| Sinal cross-run | Valor | Threshold | OK |"
            echo "|---|---|---|---|"
            echo "| 📥 Artefato anterior encontrado | \`$PREV_FOUND\` | — | — |"
            echo "| 🔗 Overlap (prev.post ∩ cur.pre) | \`$CROSS_OVERLAP\` | \`>= $MIN_CROSS_OVERLAP\` | \`$CROSS_OVERLAP_OK\` |"
            echo "| 📏 Δ size (prev.post → cur.pre) | \`${SIZE_DELTA_PCT}%\` | \`<= ${MAX_SIZE_DELTA_PCT}%\` | \`$SIZE_OK\` |"
            echo "| ⏱️ mtime continuity | \`$MTIME_CONTINUITY\` | \`required=$REQUIRE_MTIME_CONTINUITY\` | \`$MTIME_CONT_OK\` |"
            echo "| 🧪 Verdict local (intra-run) | \`$CUR_REUSED\` | \`min_overlap=${ESLINT_MIN_OVERLAP:-1}\` | — |"
            echo "| ♻️ Verdict final | \`$FINAL_REUSED\` | — | — |"
            echo ""
            echo "<details><summary>Thresholds ativos (precedência: vars > input > default)</summary>"
            echo ""
            src() { if [ -n "$1" ]; then echo "vars"; elif [ -n "$2" ]; then echo "input"; else echo "default"; fi; }
            echo "| Parâmetro | Valor | Origem |"
            echo "|---|---|---|"
            echo "| \`ESLINT_MIN_OVERLAP\` | \`${ESLINT_MIN_OVERLAP:-1}\` | \`$(src "$VAR_MIN_OVERLAP" "$IN_MIN_OVERLAP")\` |"
            echo "| \`ESLINT_MIN_CROSS_OVERLAP\` | \`$MIN_CROSS_OVERLAP\` | \`$(src "$VAR_MIN_CROSS_OVERLAP" "$IN_MIN_CROSS_OVERLAP")\` |"
            echo "| \`ESLINT_MAX_SIZE_DELTA_PCT\` | \`$MAX_SIZE_DELTA_PCT\` | \`$(src "$VAR_MAX_SIZE_DELTA_PCT" "$IN_MAX_SIZE_DELTA_PCT")\` |"
            echo "| \`ESLINT_REQUIRE_MTIME_CONTINUITY\` | \`$REQUIRE_MTIME_CONTINUITY\` | \`$(src "$VAR_REQUIRE_MTIME_CONTINUITY" "$IN_REQUIRE_MTIME_CONTINUITY")\` |"
            echo "| \`ESLINT_REQUIRE_MTIME_CHANGED\` | \`${ESLINT_REQUIRE_MTIME_CHANGED:-false}\` | \`$(src "$VAR_REQUIRE_MTIME_CHANGED" "$IN_REQUIRE_MTIME_CHANGED")\` |"
            echo ""
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"



      # Verifica existência do .eslintcache para condicionar o upload do artefato.
      - name: Check .eslintcache presence
        if: always()
        id: eslint-cache-file
        run: |
          if [ -f node_modules/.cache/eslint/.eslintcache ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Disponibiliza o .eslintcache como artefato do job para inspeção manual
      # da evidência de reutilização entre execuções de CI.
      - name: Upload .eslintcache artifact
        id: upload-eslintcache
        if: always() && steps.eslint-cache-file.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eslintcache-${{ github.run_id }}-${{ github.run_attempt }}
          path: node_modules/.cache/eslint/.eslintcache
          if-no-files-found: ignore
          retention-days: 7

      # Anexa snapshots pre/post (chaves, diffs e metadata) como artefato
      # separado para comparação offline de mtime, tamanho e overlap.
      - name: Upload ESLint cache snapshots
        id: upload-eslint-snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-cache-snapshots-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/eslint-cache-snapshot/
          if-no-files-found: ignore
          retention-days: 7

      # Publica no $GITHUB_STEP_SUMMARY links diretos para os artefatos gerados,
      # facilitando a inspeção da evidência de reutilização do cache.
      - name: Summarize ESLint artifact links
        if: always()
        env:
          CACHE_NAME: eslintcache-${{ github.run_id }}-${{ github.run_attempt }}
          CACHE_URL: ${{ steps.upload-eslintcache.outputs.artifact-url }}
          CACHE_ID: ${{ steps.upload-eslintcache.outputs.artifact-id }}
          SNAP_NAME: eslint-cache-snapshots-${{ github.run_id }}-${{ github.run_attempt }}
          SNAP_URL: ${{ steps.upload-eslint-snapshots.outputs.artifact-url }}
          SNAP_ID: ${{ steps.upload-eslint-snapshots.outputs.artifact-id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          fmt_link() {
            local name="$1" url="$2" id="$3"
            if [ -n "$url" ]; then
              echo "[\`$name\`]($url)"
            elif [ -n "$id" ]; then
              echo "[\`$name\`](${RUN_URL}/artifacts/${id})"
            else
              echo "_não publicado_"
            fi
          }
          CACHE_LINK=$(fmt_link "$CACHE_NAME" "$CACHE_URL" "$CACHE_ID")
          SNAP_LINK=$(fmt_link "$SNAP_NAME" "$SNAP_URL" "$SNAP_ID")
          {
            echo "## 📦 ESLint cache — Artefatos"
            echo ""
            echo "| Artefato | Conteúdo | Link |"
            echo "|---|---|---|"
            echo "| .eslintcache | Arquivo binário do ESLint (evidência bruta de reutilização) | $CACHE_LINK |"
            echo "| snapshots pre/post | \`metadata.txt\`, \`pre-keys.txt\`, \`post-keys.txt\`, \`added/removed/overlap-keys.txt\` | $SNAP_LINK |"
            echo ""
            echo "> Página do run: [$RUN_URL]($RUN_URL) (aba **Artifacts** no rodapé)"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"





      - name: Save ESLint cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: node_modules/.cache/eslint
          key: ${{ runner.os }}-eslint-v1-${{ hashFiles('eslint.config.*', 'bun.lockb', 'bun.lock') }}-${{ github.run_id }}
