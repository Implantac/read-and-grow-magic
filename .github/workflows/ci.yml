name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # Falha em qualquer erro/warning novo, EXCETO @typescript-eslint/no-explicit-any
      # (limpeza incremental ainda em andamento).
      - name: Lint (strict, ignora no-explicit-any)
        run: bun run lint:ci
